<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Street Dog Services</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="input-box">
                <input type="email" id="loginEmail" name="email" placeholder=" " autocomplete="email" required>
                <label for="loginEmail">Email</label>
            </div>
            <div class="input-box">
                <input type="password" id="loginPassword" name="password" placeholder=" " autocomplete="current-password" required>
                <label for="loginPassword">Password</label>
            </div>
            <button type="submit" class="btn">Login</button>
            <p>Don't have an account? <a href="register.html">Register</a></p>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
